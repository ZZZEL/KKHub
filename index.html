<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KK园区 | 创意内容入口</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/home.css" />
  </head>
  <body>
    <main class="site-shell">
      <header class="portal-nav" aria-label="KK园区导航">
        <a class="portal-brand" href="#entrance" aria-label="回到KK园区入口">
          <span>KK园区</span>
        </a>
        <nav class="portal-links" aria-label="页面导航">
          <a href="#entrance">入口</a>
          <a href="#creative-grid">创意内容</a>
          <a href="#about">关于</a>
        </nav>
      </header>

      <section class="portal-hero" id="entrance" aria-labelledby="portalTitle">
        <div class="hero-copy">
          <h1 id="portalTitle">把创意内容<br />安放在一座园区里</h1>
          <p>玻璃猫是第一间开放的工作室，之后更多小实验会在这里排队亮灯。</p>
          <div class="hero-actions">
            <a class="primary-action" href="./studios/glass-cat/index.html">进入玻璃猫</a>
            <a class="secondary-action" href="#creative-grid">查看园区地图</a>
          </div>
        </div>
        <section class="banner-rail" aria-label="园区滚动横幅">
          <a class="banner-slide" href="./studios/glass-cat/index.html" aria-label="进入玻璃猫工作室">
            <img src="./assets/portal/glass-cat-banner.jpg" alt="透明压花玻璃猫工作室视觉" />
            <span class="banner-caption">
              <span>玻璃猫</span>
              <span>第一间开放工作室</span>
            </span>
          </a>
        </section>
      </section>

      <section class="studio-directory" id="creative-grid" aria-labelledby="directoryTitle">
        <div class="section-heading">
          <h2 id="directoryTitle">开放中的工作室</h2>
          <p>每一张卡片都是一个可以被点亮的创意入口。</p>
        </div>
        <div class="project-grid">
          <a class="project-card" href="./studios/glass-cat/index.html" aria-label="进入玻璃猫">
            <span class="project-thumb">
              <img src="./assets/portal/glass-cat-banner.jpg" alt="透明压花玻璃猫工作室视觉" />
            </span>
            <span class="project-content">
              <span class="project-title">玻璃猫</span>
              <span class="project-copy">方格压花玻璃折射实验</span>
              <span class="project-status open"><span aria-hidden="true"></span>已开放</span>
            </span>
            <span class="project-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 12h14" />
                <path d="m13 6 6 6-6 6" />
              </svg>
            </span>
          </a>

          <article class="project-card">
            <span class="empty-studio" aria-hidden="true">
              <span></span>
            </span>
            <span class="project-content">
              <span class="project-title">即将开放</span>
              <span class="project-copy">下一间工作室正在搭建灯光。</span>
              <span class="project-status">待开放</span>
            </span>
          </article>

          <article class="project-card">
            <span class="empty-studio" aria-hidden="true">
              <span></span>
            </span>
            <span class="project-content">
              <span class="project-title">即将开放</span>
              <span class="project-copy">新的小实验会继续排列进来。</span>
              <span class="project-status">待开放</span>
            </span>
          </article>

          <article class="project-card">
            <span class="empty-studio" aria-hidden="true">
              <span></span>
            </span>
            <span class="project-content">
              <span class="project-title">即将开放</span>
              <span class="project-copy">这里预留给未来的创意内容。</span>
              <span class="project-status">待开放</span>
            </span>
          </article>
        </div>
      </section>

      <footer class="portal-footer" id="about">
        <p>园区状态：一切正常</p>
        <p>把创意内容安放在一座园区里。</p>
      </footer>
    </main>
  </body>
</html>
